<!DOCTYPE html>
<html lang="pt-br ">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoppe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="body1">
    <main class="mainIndex">
      <section id="login">
        <h1>Login</h1>
        <h3>Bem vindo para o site de Alunos do Senai</h3>
        <div class="inputs">
          <p>E-mail:</p>
          <input type="email" placeholder="email" id="emailInput" required />
        </div>
        <div class="inputs">
          <p>Senha:</p>
          <input type="password" placeholder="senha" id="senhaInput" required />
        </div>
        <div>
          <button id="cadastroBtn">Cadastro</button>
          <button id="loginBtn">Login</button>
        </div>
      </section>
      <section id="inicio"></section>
    </main>
    <footer></footer>
    <script type="module" src="main.js"></script>
  </body>
</html>
