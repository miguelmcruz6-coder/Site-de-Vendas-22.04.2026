<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoppe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header id="header">
      <div id="usuario">
        <img src="" alt="" />
        <p id="nomeUsuario"></p>
      </div>
      <ul>
        <li></li>
      </ul>
    </header>
    <main>
      <section id="login">
        <p>E-mail:</p>
        <input type="email" placeholder="email" id="emailInput" required />
        <br />
        <p>Senha:</p>
        <input type="text" placeholder="senha" id="senhaInput" required />
        <br />
        <div>
          <button id="cadastroBtn">Cadastro</button>
          <button id="loginBtn">Login</button>
        </div>
      </section>
      <section id="inicio"></section>
    </main>
    <footer></footer>
    <script src="main.js"></script>
  </body>
</html>
